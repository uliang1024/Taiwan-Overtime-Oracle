name: Overtime-Oracle-Combined-Job

on:
  schedule:
    # 1. 每個月 1 號的台灣時間早上 9:00 (UTC 01:00)
    # 負責發送當月的「完整攻略」
    - cron: '0 1 1 * *' 
    
    # 2. 每天的台灣時間早上 9:00 (UTC 01:00)
    # 負責發送「今日加班提醒」
    - cron: '0 1 * * *' 
    
  workflow_dispatch: # 依然保留手動按鈕，方便測試

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Oracle
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python src/main.py